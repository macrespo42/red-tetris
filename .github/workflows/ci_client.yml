name: Client CI

on:
  push:
    branches:
      - "*"
jobs:
  styles:
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - name: Install dependencies
        run: |
          cd client
          pnpm install

      - name: Lint
        run: |
          cd client
          pnpm lint
