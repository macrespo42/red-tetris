name: Build docker

on:
  push:
    branches:
      - "main"
jobs:
  build:
    name: Publish
    runs-on: ubuntu-latest
    strategy:
      matrix:
        container:
          - client
          - server
    permissions:
      contents: read
      packages: write

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Containers
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.container }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/macrespo42/${{ matrix.container }}:latest
